<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/favicon-192.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="theme-color" content="#1a1510" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Harsha Art Gallery - Premium Handcrafted Embroidery & Art Work. Aari Work, Thread Embroidery, Bead Work, Sequence Work, Wedding Frames." />
    <title>Harsha Art Gallery | Handcrafted Embroidery</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet" />
    <style>
      #splash {
        position: fixed; inset: 0; z-index: 9999;
        background: #1a1510;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        transition: opacity 0.5s ease;
      }
      #splash.fade-out { opacity: 0; pointer-events: none; }
      #splash img {
        width: 120px; height: 120px; border-radius: 50%; object-fit: cover;
        animation: pulse-logo 2.5s ease-in-out infinite;
        box-shadow: 0 0 0 0 rgba(200,134,15,0.4);
      }
      @keyframes pulse-logo {
        0%   { box-shadow: 0 0 0 0 rgba(200,134,15,0.5); }
        70%  { box-shadow: 0 0 0 20px rgba(200,134,15,0); }
        100% { box-shadow: 0 0 0 0 rgba(200,134,15,0); }
      }
      #splash h1 {
        margin-top: 20px;
        font-family: 'Playfair Display', Georgia, serif;
        font-size: 22px; font-weight: 700;
        color: #fff; letter-spacing: 0.05em;
      }
      #splash p {
        font-family: 'Cormorant Garamond', Georgia, serif;
        font-style: italic; font-size: 13px;
        color: #c8860f; letter-spacing: 0.15em;
        margin-top: 4px;
      }
      .splash-dots {
        display: flex; gap: 6px; margin-top: 24px;
      }
      .splash-dot {
        width: 6px; height: 6px; border-radius: 50%;
        background: #c8860f;
        animation: blink 1.2s ease-in-out infinite;
      }
      .splash-dot:nth-child(2) { animation-delay: 0.2s; }
      .splash-dot:nth-child(3) { animation-delay: 0.4s; }
      @keyframes blink {
        0%, 100% { opacity: 0.2; }
        50%       { opacity: 1; }
      }
    </style>
  </head>
  <body>
    <!-- Splash screen — hidden once React mounts -->
    <div id="splash">
      <img src="/assets/logo-loading.png" alt="Harsha Art Gallery" />
      <h1>Harsha Art Gallery</h1>
      <p>Handmade with LOVE</p>
      <div class="splash-dots">
        <div class="splash-dot"></div>
        <div class="splash-dot"></div>
        <div class="splash-dot"></div>
      </div>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      // Remove splash once React has rendered the first frame
      document.addEventListener('DOMContentLoaded', () => {
        const observer = new MutationObserver(() => {
          const root = document.getElementById('root')
          if (root && root.children.length > 0) {
            const splash = document.getElementById('splash')
            if (splash) {
              splash.classList.add('fade-out')
              setTimeout(() => splash.remove(), 500)
            }
            observer.disconnect()
          }
        })
        observer.observe(document.getElementById('root'), { childList: true, subtree: true })
      })
    </script>
  </body>
</html>
